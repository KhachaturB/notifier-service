# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.$COMMIT_COUNT"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ./gradlew build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/libs/*.jar

      - name: Output version for deploy job
        run: echo "VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: Prod
      url: https://86.48.2.136
    permissions:
      contents: write

    steps:
      - name: Get VERSION from build job
        run: echo "VERSION=${{ needs.build.outputs.VERSION }}" >> $GITHUB_ENV

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build/libs/

      - name: Deploy to server
        env:
          SERVER_HOST: 86.48.2.136
          SERVER_PORT: 22
          SERVER_LOGIN: ${{ secrets.SERVER_LOGIN }}
          SERVER_PASS: ${{ secrets.SERVER_PASS }}
          DEPLOY_DIR: /app
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          APP_VERSION: ${{ env.VERSION }}
        run: |
          # Install sshpass if not present
          sudo apt-get update && sudo apt-get install -y sshpass

          echo "Stopping existing application..."
          sshpass -p "$SERVER_PASS" ssh -P $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_LOGIN@$SERVER_HOST "pkill -f 'java.*notifier-service' || true" || true
          echo "Application stopped"

          echo "Deploying JAR file..."
          sshpass -p "$SERVER_PASS" scp -P $SERVER_PORT -o StrictHostKeyChecking=no build/libs/*.jar $SERVER_LOGIN@$SERVER_HOST:$DEPLOY_DIR/
          echo "JAR file deployed"

          echo "Setting environment variables..."
          sshpass -p "$SERVER_PASS" ssh -P $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_LOGIN@$SERVER_HOST "echo '$SERVER_PASS' | sudo -S bash -c 'echo NIM_API_KEY=$NIM_API_KEY > /etc/notifier/notifier-env'"
          sshpass -p "$SERVER_PASS" ssh -P $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_LOGIN@$SERVER_HOST "echo '$SERVER_PASS' | sudo -S bash -c 'echo APP_VERSION=$APP_VERSION >> /etc/notifier/notifier-env'"
          echo "Environment variables set"

          echo "Starting application..."
          sshpass -p "$SERVER_PASS" ssh -P $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_LOGIN@$SERVER_HOST "echo '$SERVER_PASS' | sudo -S systemctl start notifier.service"
          echo "Application started"

      - name: Create git tag
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"
