# Main pipeline - runs on main branch push

name: Main Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        uses: PaulHatch/semantic-version@v5.2.0
        with:
          prefix: 'v'
        id: version

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        env:
          APP_VERSION: ${{ needs.build.outputs.VERSION }}
        run: |
          ./gradlew build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build/libs/

      - name: Deploy to server
        env:
          SERVER_HOST: 86.48.2.136
          SERVER_PORT: 22
          SERVER_LOGIN: ${{ secrets.SERVER_LOGIN }}
          SERVER_PASS: ${{ secrets.SERVER_PASS }}
          DEPLOY_DIR: /app
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          APP_VERSION: ${{ needs.build.outputs.VERSION }}
        run: |
          ./gradlew build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build/libs/

      - name: Deploy to server
        env:
          SERVER_HOST: 86.48.2.136
          SERVER_PORT: 22
          SERVER_LOGIN: ${{ secrets.SERVER_LOGIN }}
          SERVER_PASS: ${{ secrets.SERVER_PASS }}
          DEPLOY_DIR: /app
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: |
          # Install sshpass if not present
          sudo apt-get update && sudo apt-get install -y sshpass

          echo "Stopping existing application..."
          sshpass -p "$SERVER_PASS" ssh -P $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_LOGIN@$SERVER_HOST "pkill -f 'java.*notifier-service' || true" || true
          echo "Application stopped"

          echo "Deploying JAR file..."
          sshpass -p "$SERVER_PASS" scp -P $SERVER_PORT -o StrictHostKeyChecking=no build/libs/*.jar $SERVER_LOGIN@$SERVER_HOST:$DEPLOY_DIR/
          echo "JAR file deployed"

          echo "Setting environment variables..."
          sshpass -p "$SERVER_PASS" ssh -P $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_LOGIN@$SERVER_HOST "echo '$SERVER_PASS' | sudo -S bash -c 'echo NIM_API_KEY=$NIM_API_KEY > /etc/notifier/notifier-env'"
          echo "Environment variables set"

          echo "Starting application..."
          sshpass -p "$SERVER_PASS" ssh -P $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_LOGIN@$SERVER_HOST "echo '$SERVER_PASS' | sudo -S systemctl start notifier.service"
          echo "Application started"

      - name: Create git tag
        run: |
          git tag "v${{ needs.build.outputs.VERSION }}"
          git push origin "v${{ needs.build.outputs.VERSION }}"

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.build.outputs.VERSION }}
          release_name: Release v${{ needs.build.outputs.VERSION }}
          draft: false
          prerelease: false
