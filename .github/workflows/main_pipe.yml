# Main pipeline - runs on main branch push

name: Main Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        uses: PaulHatch/semantic-version@v5.2.0
        with:
          tag_prefix: 'v'
        id: version

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./gradlew build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/libs/*.jar

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build/libs/

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        env:
          APP_VERSION: ${{ needs.build.outputs.VERSION }}
        run: |
          ./gradlew jib --image=ghcr.io/khachaturb/notifier-service:$APP_VERSION

  deploy:
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    environment:
      name: Prod
      url: https://notifier.vachoo.ru

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Create namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry image-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.IMAGE_PULL_SECRET }} \
            --namespace=app \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          kubectl create secret generic notifier-secrets \
            --namespace=app \
            --from-literal=nim-api-key=$NIM_API_KEY \
            --from-literal=db-user=$DB_USER \
            --from-literal=db-pass=$DB_PASS \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/ --namespace=app

          kubectl set env deployment/notifier-service \
            NIM_API_KEY=$NIM_API_KEY \
            SPRING_DATASOURCE_USERNAME=$DB_USER \
            SPRING_DATASOURCE_PASSWORD=$DB_PASS \
            --namespace=app

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/notifier-service --namespace=app --timeout=300s

      - name: Create git tag
        run: |
          git tag "v${{ needs.build.outputs.VERSION }}"
          git push origin "v${{ needs.build.outputs.VERSION }}"

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.build.outputs.VERSION }}
          release_name: Release v${{ needs.build.outputs.VERSION }}
          draft: false
          prerelease: false