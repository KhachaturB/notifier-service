databaseChangeLog:
  - changeSet:
      id: create-quiz-results-table
      author: developer
      changes:
        - createTable:
            tableName: quiz_results
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    foreignKeyName: fk_quiz_results_user
                    references: users(id)
                    nullable: false
              - column:
                  name: answer
                  type: integer[]
                  constraints:
                    nullable: false
              - column:
                  name: primary_goal
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: motivation_style
                  type: varchar(30)
                  constraints:
                    nullable: false
